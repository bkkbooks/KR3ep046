貝熟棗仁川連拌白芍茯神香附白前薇八月札竹茹玫瑰花制茺蔚子案寒邪傷中瘕攻腹痛脈左弦以仲景方牛膝青陳皮瓦楞白芍上桂心飯丸藥送薑夏葫蘆巴沉香蓯蓉蓽澄茄吳萸川連三分拌淡草雲苓良薑竹茹薑汁炒案木鬱不達瘕攻咳逆瓦楞青陳皮元丹參茯神川貝八月札白芍川鬱金烏勒草川楝香附上沉香蘇子二錢五分拌竹茹玫瑰花三朵同制女科子懸居經七月少腹作痛氣滯輒脹身熱口渴舌淡絳脈弦滑是胎氣上逼厥陰氣滯也以紫蘇飲子佐安胎元蘇梗大腹桑葉山梔寄生半夏青陳皮枳殼砂仁鉤鉤香附條芩原斛鮮佛手女科惡阻案居經三月脘滿泛嘔得食輒脹身熱形寒舌糙脈弦小滑似屬孕象以紫蘇飲子大意還祈裁酌蘇梗川連拌大腹條芩半夏扁斛桑葉白蔻衣枳殼寄生艾葉陳皮茯神山梔薑汁竹茹案漏胎嘔逆脘滿泛嘔肝胃不和沖虛有熱紫蘇寄生烏鰂骨歸身炒黑香附川鬱金枳殼川斷茜根炭白芍淮藥陳棕炭淡芩案居經月餘身熱嘔惡蘇梗川連拌條芩銀胡當歸菟絲山梔川斷枳殼半夏白芍川芎茯神蔻衣白薇青陳皮案居經四月挾感寒邪脈弦數治以疏和蘇梗半夏寄生大腹知母山梔川連枳殼條芩茯神原斛鉤鉤薑汁竹茹案經停嘔吐肝胃升降不調脈弦小滑似屬惡阻川連薑夏蘇梗山梔條芩艾葉竹茹薑汁炒吳萸同搗雲苓蔻衣鉤鉤寄生陳皮白芍旋覆代赭拌女科産後瘀阻案産後八朝惡露少通復感寒邪寒熱俱甚腹痛嘔逆頭疼汗多脈弦小數治以辛散兩和營衛兼通惡露歸身桃仁蒲黃白芍桂枝二分拌淡草川鬱金茺蔚子川芎黑薑五靈脂半夏香附青陳皮薑汁竹茹案初産兩朝惡露稀少腹大不收瘕攻作痛脈小弦以生化湯加失笑散防血瘀上衝當歸桃仁蒲黃牛膝川楝四制香附抱茯神川芎黑薑五靈脂白芍桂枝二分拌大腹青陳皮益母草案新産三朝瘀凝少通少腹瘕攻作痛脈小弦以生化失笑之屬當歸三錢桃仁蒲黃川斷九香蟲牛膝四制香附川芎黑薑五靈脂瓦楞青陳皮鬱金益母草痛甚加肉桂三分飯丸案胎前便瀉繼於産後新産惡露少通腹痛脹及少腹舌糙苔膩脈弦小數法當健運中室兼以逐瘀當歸於術土炒茯苓陳皮蒲黃扁斛荷蒂川芎炮薑炒炭焦芍扁豆靈脂穀芽木香益母草案産後百日惡露少通少腹攻痛腰痠帶下眩旋脘悶舌糙脈弦小數瘀聚於內尚防崩漏歸尾小茴香拌甲片川鬱金澤蘭菟絲香附白芍上桂心二分拌茺蔚子桃仁茯神青陳皮牛膝川斷延胡川芎案産後瘀凝不通月事五月不下少腹攻痛聚塊形似癥瘕脈小弦並無弦滑之象難憑孕象徵歸尾茴香拌香附青陳皮川芎延胡牛膝九香蟲白芍澤蘭川鬱金川斷金鈴竹茹茺蔚子案新産五朝偶感風寒身熱脘悶腹痛汗多舌黃膩脈小弦以清魂失笑之屬黑荊芥川芎桃仁川鬱金浮小麥枳殼冬桑葉當歸炮薑蒲黃五靈脂穭豆衣陳皮益母草改方當歸桃仁川鬱金澤蘭原斛茯神川芎炮薑益母草牛膝新會皮枳殼案産後瘀月餘惡露早斷少腹攻痛脈弦數恐成腸癰白芍上桂心二分酒製桃仁蒲黃乳香川鬱金澤蘭川芎一錢歸尾甲片五靈脂沒藥九香蟲牛膝茺蔚子案産後瘀阻少腹攻痛營衛不和寒熱往來白芍桂枝二分拌炒半夏牛膝歸尾生蒲黃川鬱金川楝淡草青陳皮桃仁甲片五靈脂澤蘭茺蔚子復方産後腹痛已止再調氣血當歸川芎川鬱金朴花桑葉原斛白芍細地砂仁末炒青陳皮香附四制茯神川斷
