body:
  text: 卷下女科咳嗆案諸氣膹郁皆屬於肺咳嗆喉疼嘔吐痰涎脈右數從三焦咳狀咳而嘔逆治旋覆淡草沉香川貝橘紅半夏刀豆子代赭蘇子白芍杏仁茯苓竹茹水炙戌腹糧復方咳嗆依然嘔逆稍緩火升喉疼脈右數當治肺胃玄參生草川貝炒黃白芍原金斛旋覆扁豆杏仁茯苓訶子白朮香穀芽代赭竹茹水炙案痰火留肺肺氣膹郁咳嗆氣促脈右數治以降氣滌痰粉參黛蛤散川貝蘇子桑葉茯苓鬱金白前炙紫菀杏仁鼠黏石膏冰糖煅淡草牙皂二錢五分竹茹案病後復感肺胃失宣老山西洋參知母葶藶川貝旋覆鬱金扁金斛石膏冰糖煅生草蘇子杏仁代赭茯神天花粉竹葉案周血虛生熱火爍肺金形寒身熱咳嗆痰稠舌白糙脈右弦數是木火刑金使然人咳恐見痰紅柴胡酒炒白芍丹皮川貝蘇子白前薇黛蛤散紫菀當歸酒炒桑葉山梔杏仁鼠黏子川鬱金枇杷葉案胎前咳嗆繼以産後肺元自虛音嘶面浮脈弦小數是木火刑金以西昌法粉沙參白前知母杏仁葶藶石膏冰糖煅白石英黛蛤散紫菀川貝淡草雲苓蟬啼殼枇杷葉西藏果八分案體本血虛肝旺近挾暑風咳嗆身熱脈小數先治其標鮮斛山梔冬瓜子苡仁川貝炒枳殼蘆根連翹鉤鉤橘紅絡杏仁鬱金益元散竹茹案寒熱咳嗆得之産後脈右小數防成蓐勞白芍炙桂枝二分拌香附川貝母旋覆代赭石炒橘紅絡原斛水炙竹茹枳殼砂仁炒杏仁歸鬚茯苓神蔞仁絲瓜絡案産後咳嗆肺虛火盛脈右數當養肺陰以清肺火川貝白前知母蘇子黛蛤散冬瓜子絲瓜絡杏仁紫菀茯苓鼠黏橘紅絡淡甘草枇杷葉案産後挾感身熱咳嗆葶藶生草蘇子旋覆川楝子茯苓皮扁斛杏仁鬱金川貝大腹橘紅絡茺蔚子竹茹案子嗽居經七月胎火上衝肺金咳嗆氣逆脈右數治以宣泄蘇子梗鬱金知母葶藶旋覆淡草橘絡絲瓜絡炒枳殼杏仁川貝條芩代赭地骨復方胎火上灼陽明治以清泄元參石膏冰糖煅川貝蘇子條芩山梔茯神知母淡甘草杏仁川連寄生原斛竹葉案痰火上留肺氣膹郁葶藶生草耆皮生白朮旋覆蘇子蔞仁杏仁川貝防風橘紅絡代赭茯神竹茹枇杷葉案暑風襲肺肺氣膹郁近復飲食不節痰阻絡道右脅肋抽痛發熱形寒舌糙脈弦滑數法當通絡導痰兼疏氣滯旋覆橘絡杏仁蘇子鮮斛麥芽青蒿歸鬚新絳鬱金萊蔔牛蒡楂肉蘆根絲瓜絡案血虛生熱痰火蒙肺音嘶咳逆脈右數以清燥救肺空沙參元參知母川貝生地蘇子冬瓜子六錢蟬啼殼生草石膏冰糖煅杏仁鬱金地骨鼠黏子蘆根復方陰虛生熱火爍肺金桑葉知母杏仁川貝旱蓮苡仁冬瓜子石膏冰糖煅生草鬱金元參茯神丹皮竹二青案病傷不復咳嗆不已脈小弦以喻氏法桑葉粉沙參白前通草川貝鬱金竹二青蘇子黛蛤散紫菀滑石杏仁鼠黏子枇杷葉案肺失清肅咳嗆痰多冬瓜子杏仁元參蘇子炙橘紅連翹蘆根薏苡仁川貝鬱金鼠黏子旋覆鉤鉤竹茹案衛陽薄弱外感易侵身熱咳嗆脈右數以玉屏風散耆皮生白朮苡仁川貝桑葉扁斛蘆根防風冬瓜子杏仁鬱金丹皮茯神竹茹案木火刑金氣粗咳逆痰出薄白脈左弦以平木清金粉沙參白前桑葉穭豆衣茯苓淡草黛蛤散紫菀川貝炒杏仁澤瀉竹茹枇杷葉復方肺陰延虛木火偏旺入夜身熱尤甚是不耐炎暑蒸逼脈小弦癆損之漸桑葉杏仁粉沙參白前川貝茯苓白石英石膏冰糖煅生草黛蛤散紫菀橘紅竹茹枇杷葉案失血咳嗆裡熱形寒月事愆期時覺腹痛脈右數治先和絡清金桑葉仙鶴草葶藶蘇子川鬱金桃仁澤蘭旱蓮茜根杏仁茯神川貝母丹皮竹茹玫瑰花炒茺蔚子復方癸停三月失血已止咳嗆未已時覺形寒脈右數似屬孕象姑以紫蘇飲蘇梗川連四分拌大腹條芩知母銀胡青蒿杏仁枳殼橘紅絡艾葉川貝白芍地骨桑葉水炙竹茹案臨産遭感形寒發熱熱甚即産産後熱勢不退兼有咳嗆脘滿腹脹便結口渴舌絳苔剝脈右小滑而數亟以清魂之屬炒荊芥川芎原斛焙丹皮桑葉朴花穭豆衣當歸桃仁元丹參山梔鉤鉤茯神益母草竹茹薑汁炒復方産後感邪漸化餘熱未徹腰部痠痛飲食式微脈小數再以疏泄原斛桑葉茯神當歸川斷穭豆衣牛膝焙丹皮山梔川芎桃仁杜仲雞血藤茺蔚子案流行性感冒肺胃吸受咳嗆頭疼脘悶肢痠舌糙根膩脈弦而數以銀翹散銀花荊芥杏仁蟬衣山梔象貝蘆根翹心牛蒡鬱金薄荷鉤鉤茯神忍冬藤女科痰飲氣虛飲勝哮嗽氣促身熱痰稠脈沉弦以金匱方白前萊蔔雲苓海石蛤殼旋覆代赭拌枳殼蘇子橘紅半夏牛膝川貝炒杏仁淡草枇杷葉女科風溫附濕溫秋溫冬溫案春溫乘勞倦而發化熱釀痰邪鬱氣分白㾦層出咳嗆痰稠汗多氣促便難食懈舌剝尖絳脈弦而滑是正虛邪戀亟以甘涼承津佐以清養桑葉石膏冰糖煅川貝橘紅絡鐵皮斛生地葶藶知母生草杏仁辰茯神甜花粉銀花竹葉絲瓜絡前方先録投輕清透達法寒熱如瘧㾦點微露胸脘略爽汗出頗多舌糙黃膩罩灰脈弦滑數病是濕溫胎氣尚在險途羚羊牛蒡杏仁菖蒲蒿梗枳實山梔連翹鉤鉤鬱金鐵皮斛淡芩蔞仁蘆根燈芯案春溫襲肺化熱釀痰頭疼形寒身熱咳嗆舌黃糙脈右弦滑姑以宣豁荊芥牛蒡前胡杏仁象貝橘紅絡蘆根連翹鉤鉤枯芩鬱金蘇子辰茯神竹茹案秋溫失表病經兩旬邪郁不達既不成瘧也不發㾦頃則汗出滂沱肢厥煩渴神識昏迷胸次紅疹隱約未露據述病起天癸適至邪入血室無疑舌乾絳苔少脈細而沉虛弱之體厥脫堪虞洋參參鬚同煎沖知母青金散犀角盤桑葉遠志茯神生草霍石斛生地露石決龍齒燈芯捲心二診紅疹隱而未露厥潮起伏無常汗出滂沱脈沉虛細脫象已萌難圖萬一桂枝淡草龍齒桑葉遠志生石膏牛膝牡蠣石決麥冬生地露煎湯代水八兩三診自投桂枝白虎合龍蠣復脈四肢得溫厥潮已止自汗未至止形神稍振脈仍虛細重按稍有神韻左關微弦雖逾險嶺未入坦途老山西洋參吉林參鬚同前沖麥冬霍斛桑葉知母淡甘草牡蠣五味茯神石膏冰糖煅川貝生地露龍齒竹葉案勞倦陽弛秋溫乘襲咳嗆痰稠氣促脘悶少腹䐜脹大便不通形寒身熱舌黃膩脈右滑大高年逆象法當宣肺滌痰佐和肝胃沉香象貝杏仁牛蒡橘紅絡蔞皮茯神辰拌蘆根蘇子鉤鉤鬱金連翹小青皮山梔大豆卷拌鮮斛復方高年以右脈滑大為逆肺胃痰熱依然矇蔽寤醒時轟熱懊憹便溏不爽舌光苔浮有昏喘之虞天竺黃萊蔔鬱金白前橘紅絡礞石川貝母鮮金斛杏仁茯神辰拌蘇子竹瀝製半夏遠志蘆根菖蒲飯蒸案痰阻絡道咳痰抽疼身熱煩渴便通且溏脈弦數舌黃糙再以清解天竺黃萊蔔杏仁蟬衣山梔象貝茯神辰拌路路通鮮金斛翹心鬱金牛蒡鉤鉤蘇子蘆根絲瓜絡案冬溫痰熱上蒙肺胃宿飲泛濫咳痰氣促脈滑數防昏喘天竺黃萊蔔杏仁象貝橘絡辰茯神枳殼鐵皮斛知母鬱金蘇子白芥天花粉竹葉絲瓜絡案冬溫痰熱膠固肺胃失宣桑葉石膏冰糖煅元參蟬啼花生地葶藶鐵皮斛知母生草杏仁天花粉丹皮天竺黃辰茯神蘇子二診痰熱漸化音嘶未復元參蟬啼花石膏冰糖煅象貝生地鐵皮斛葶藶知母生甘草杏仁銀花蔞仁茯神辰拌竹葉空沙參三診熱灼肺胃咳嗆音嘶空沙參元參葶藶萊蔔知母杏仁丹皮二錢蟬啼花生草蘇子生地象貝鬱金竹葉石膏冰糖煅改方去空沙參蘇子萊蔔加天花粉鮮金斛女科附風痧案伏暑旬日先從膜原外騰為瘧復又轉出氣分為白㾦壯熱多汗脘悶氣粗舌灰脈弦滑數居經六月胃府司胎亟以甘涼桑葉知母銀花鐵皮斛山梔枳殼鬱金生石膏生草翹心桑寄生鉤鉤草果茯神竹葉案體素肝胃不和近復勞倦感寒挾時令暑濕由脘痛而致嘔吐胸次白㾦微露瞀悶神疲額汗煩渴舌黃糙脈細而軟是正虛邪戀虛弱之體汗脫堪虞鐵皮斛銀花旋覆桑葉滑石藿香川連拌丹皮糯稻須翹心山梔代赭茯神淡草川鬱金枳殼拌竹茹水炙復方紅白㾦沛露胸項潮熱起伏肝胃不和嘔逆頻仍脘悶神倦口渴躁煩舌糙罩灰脈右小數邪未盡徹正氣先虛論治當以肝胃立法鐵皮斛知母桑葉銀花藿香川連拌生地滑石煅石膏生草石決青黛拌川鬱金枳殼拌丹皮山梔茯神竹葉三診紅㾦漸隱白㾦透露暑濕由氣分外泄潮熱起伏汗出不多惟肝胃通降失調時有嘔惡舌絳灰色已退脈小弦而數治以甘涼佐以芳香希圖轉機鐵皮斛知母銀花丹皮藿香川連拌佩蘭桑葉西洋參淡草翹心石決青黛拌枳殼山梔茯神生白芍案素來體虛挾感秋溫引動伏暑病經兩旬紅白㾦遍體沛露厥陽風木乘間升擾熱迫便溏嘔惡頻仍潮熱起伏汗出滂沱舌黃膩尖絳脈弦滑數時覺腹痛恐瘀凝氣滯也有風動痙厥之險鐵皮斛銀花桑葉山梔龍齒西洋參焦芍茺蔚子茯神辰拌翹心石決青黛拌延胡牡蠣炒黃川貝西珀水炙竹茹玫瑰花制復方便瀉已止腹痛依然紅白㾦沛露胸項連及四肢厥潮起伏汗出滂沱舌黃膩尖絳脈小數勢頗凶險桂枝知母牡蠣老山西洋參生白芍銀花生地露糯稻根鬚煅石膏淡草龍齒霍山石斛辰茯神石決辰燈芯蘇合香丸案伏暑一症大抵受病於夏發病於秋己任編名之曰晚發道遠氣深往往不克徑從膜原外騰病起天癸適至加以悲鬱傷肝驚怖動心伏邪不自外達逆入血室一候成潮熱起伏汗出不衰㾦點微露氣分之邪雖從外泄營陰之熱盤踞不徹症見徹夜不寐驚惕抽掣煩渴恣飲神識乍清乍糊舌黃膩罩垢脈右小數左關微弦體肥多濕多痰症屬濕重於熱每易化燥傷津有液涸風動昏憒之變姑以芳香宣竅清營泄熱俾得疹㾦沛露方是邪化之機附方候裁犀尖生地西珀桑葉膽星茯神辰拌石決竹卷芯羚羊丹皮銀花翹心遠志菖蒲鬱金辰燈芯案風寒外襲先起喉痛繼則頸項兩臂風痧沛露熱甚有汗並不咳嗆舌尖起刺脈右滑數天癸適至尚防邪入血室黑荊芥丹皮牛蒡銀花杏仁鮮斛蔞仁川鬱金山梔鉤鉤翹心蟬衣澤蘭麻仁蘆根女科瘧疾案濕伏三陰發為痎瘧頭疼泛惡肢痠腰痛脈濡弦法當搜剔絡邪柴胡鱉血炒秦艽扁斛佩蘭桑葉青陳皮忍冬藤白芍威靈仙苡仁枳殼半夏茯苓神穀芽案瘧發不暢邪留不徹潮熱起伏汗出不衰脈弦數治以清透銀花牛蒡鮮斛山梔藿香川連拌鬱金枳實蘆根連翹鉤鉤茯神半夏蒿梗滑石蔞仁竹茹薑汁炒改方去枳實蔞仁竹茹加小朴案瘧發不暢濕留膽胃擾動肝邪脘格泛惡脈弦數仍以和解少陽陽明蒿梗半夏藿香山梔通草益元散竹茹薑汁炒淡芩陳皮枳殼鉤鉤赤苓白蔻衣佛手案瘧發太多氣陰延虛眩旋耳鳴神疲力懈脈虛弦高年尚防熱象桂枝牡蠣知母雲母半夏原斛桑葉白芍龍骨草果枳殼常山拌陳皮佩蘭茯神紅棗復方瘧止氣陰未復精神委頓脈濡弦徐圖恢復扁金斛佩蘭藿香陳皮秦艽生穀芽紅棗生熟苡仁山梔枳殼半夏白芍茯苓神忍冬藤另加西洋參霍石斛煎湯沖服案懷珍足月偶感寒邪腰痠腹脹形寒發熱舌糙脈弦滑以紫蘇飲蘇梗半夏黑山梔蒿梗寄生大腹忍冬藤川連枳殼純鉤鉤陳皮條芩茯神薑汁竹茹改方去鉤鉤加艾葉藿香案外感風寒內停食滯引動伏濕形寒發熱脘格泛惡舌乾絳尖糙脈弦滑數法以辛散紫蘇川連拌山梔大豆卷拌杏仁半夏蒿梗鮮斛蘆根連翹鉤鉤鬱金枳殼銀花茯神竹茹薑汁炒案瘧後震傷胎元腰痠帶下脈弦小滑防半産蘇梗大腹條芩川斷菟絲當歸青陳皮枳殼寄生艾葉杜仲茯神白芍桂枝二分拌炒忍冬藤案平素嗜茶陽氣久耗近復感寒引動伏暑濕從膜原外騰為瘧瘧發連枝肝邪上擾蓋瘧必動肝也大便時結時溏是中氣不足也半月來瘧魔退舍厥陽未平有限津液已受劫奪渴喜熱飲煩躁脘滿潮熱起伏無常舌絳苔剝尖浮白脈右小弦而數左關弦象尤甚症脈合參病在肝胃最慮液涸風動變幻附方蒞商老山西洋參知母淡草石決青黛拌八月札茯苓神竹捲心霍山石斛煅石膏桑葉滁菊玉蝴蝶生穀芽辰燈芯案瘧後余濕未徹肝木偏旺右脅抽痛形寒脘滿脈濡弦治以辛酸白芍桂枝拌薑夏青陳皮沉香扁斛佩蘭澄茄蓽茇雲苓川鬱金枳實苡仁吳萸佛手案濕著膽胃寒熱繼於間瘧是邪從膜原外騰脈弦數治以和解蒿梗半夏扁斛佩蘭通草赤苓竹茹淡芩陳皮苡仁山梔滑石枳殼忍冬藤耀庭診産後月餘營氣不充八脈太衝亦憊致惡露久停痎瘧十發無汗寒熱並甚肢節痠楚脈細弦數搏指苔薄糙擬充三陰之營氣兼固八脈之太衝歸身西耆炒丹參川斷菟絲生首烏紅棗白芍桂枝生草杜仲茯神生薑一片蔗漿一瓢案瘧發漸重膽胃濕熱尚甚法當清解生地山梔蒿梗鮮斛鉤鉤石菖蒲蘆根丹皮佩蘭淡芩連翹澤蘭川鬱金碧玉散復方瘧止而餘熱未清再理陽明桑葉丹皮原斛佩蘭通草澤瀉佛手杭菊山梔苡仁鉤鉤益元散藿梗車前案胎前寒熱熾傷胎元不足月而産産後寒熱復來反增咳嗆便泄瘀凝少腹攻痛脈弦數汗多勢非輕藐白芍桂枝三分拌當歸桃仁生蒲黃藿香草果原金斛半夏川芎二錢炮薑五靈脂制朴茯神青陳皮益母草復方瘧退小有寒熱是營衛迭偏瀉止瘕散惟咳嗆少腹抽痛臥醒時轟熱舌膩脈小弦再以通絡導痰佐和營衛白芍桂枝二分拌川芎橘絡川鬱金原斛益母草川貝川楝歸鬚桃仁炮黑薑茯神絲瓜絡改方去桂枝川楝歸鬚加當歸砂仁四制香附女科伏暑案勞倦引動伏暑但熱不涼咳嗆少痰熱迫便溏舌黃膩脈弦數法當清解藿香鮮斛杏仁象貝枳殼山梔制朴連翹鬱金蘇子萊蔔茯神辰拌蘆根絲瓜絡復方熱勢轉劇白㾦隱約咳嗆痰少熱迫便瀉舌黃垢罩灰脈弦滑數有昏喘之險羚羊牛蒡鬱金天竺黃鐵皮斛藿香川連拌山梔蘆根翹心鉤鉤茯神石菖蒲炒銀花制朴燈芯竹茹案寒邪外襲濕熱內留舌垢脈濡以梔豉湯大豆卷紫蘇桑葉杏仁通草苡仁荊芥穗黑山梔鉤鉤連翹鬱金澤瀉佩蘭竹二青女科霍亂宿飲哮喘挾感穢痧痰飲泛濫喘促不相接續吐瀉腹痛未已肢厥汗出脈沉弦喘脫堪虞炙桂枝木瓜一錢藿梗化橘紅雲苓旋覆代赭石拌白朮土炒紫石英焦白芍蠶砂三錢制朴宋半夏海石磁石竹茹薑汁炒益元散改方橘紅半夏海石蛤殼紫石英蘇子葉代赭旋覆拌雲苓川貝牛膝藿香靈磁石芥子荷葉女科便瀉案食滯不化消導過度脾胃受戕便瀉腹痛刻下雖便瀉已止脾胃生氣未醒脈小弦高年切宜調養藿香陳皮白芍白朮土炒川貝海石炒香紅棗枳殼半夏扁豆雲苓穀芽牛膝薑汁竹茹復方瀉後轉為便結濁飲泛濫氣促咳痰不爽夜寐欠安舌白膩脈弦滑數治以降氣滌痰紫石英牛膝海石旋覆葶藶生草橘紅絡云茯神知母代赭川貝杏仁竹茹絲瓜絡前方先録自投理中湯合生化失笑之屬惡露已通嘔逆得止腹痛便瀉依然脈虛弦局勢非輕於術土炒炮薑炭焦芍扁豆香附炭砂仁石蓮炙草茯苓神陳皮肉果歸身炭原斛穀芽茺蔚子復方産後泄瀉自胎前得來已經月餘腹痛已緩夜寐不安交陰身熱口渴舌光絳苔剝脈來弦滑而數當顧脾胃於術土炒茯苓神焦芍桑葉原斛穀芽丹皮炭炙草炮薑炭陳皮半夏石蓮枳殼炒香紅棗竹茹水炙背擬方據述種種病情腹瀉已經兩月是脾傷及腎胃陰受傷厥陰疏泄失司年高體弱得之調治不易懸擬易謬還希裁酌於術土炒茯苓焦芍扁豆訶子原斛穀芽炮薑炭炙草陳皮肉果川貝炒黃石蓮藝曲炒香紅棗案産後挾感初起嘔吐繼則身熱便溏惡露少通少腹攻痛神疲少寐舌白膩脈弦小數亟以健脾逐瘀徐圖轉機於術土炒茯苓神歸身焦白芍陳皮蒲黃川貝炒黃扁豆炮薑炭川芎香附炭半夏靈脂竹茹薑汁炒茺蔚子復方便瀉已止形寒身熱脘悶氣粗少腹作痛惡露少通舌糙尖絳脈弦小數得之産後調治不易歸尾茴香拌川芎川鬱金原斛穀芽牛膝四制香附白芍桂枝二分拌延胡青陳皮茯神大腹山梔茺蔚子案土不生金咳嗆便溏寅早尤甚脈小弦當治脾肺桔梗六分制朴焦芍白朮茯苓葶藶大腹杏仁扁豆陳皮川貝炒黃澤瀉淡草竹茹炒香紅棗案居經五月迭感寒邪腹痛便溏脈弦滑治以疏和紫蘇大腹藿梗寄生半夏木香竹茹枳殼陳皮制朴條芩酒炒神麯砂仁佛手案胎前咳嗆繼於産後是木火刑金近復脾土受侮腹痛便溏脈小弦恐成蓐勞焦芍於術土炒香附炭炒川貝原斛八月札石蓮陳皮扁豆縮砂仁訶子茯苓香穀芽竹茹水炙糯稻根鬚案産後肝脾失運腹痛便溏跗腫面浮脈濡弦治以疏和於術土炒茯苓皮焦芍扁豆香附肉果生炒穀芽炙草炮薑炭陳皮藝曲砂仁原斛炒紅棗女科痢疾案前方先録痢次稍緩腹痛後重脘滿輒脹眩旋腰痠脈濡小弦再以疏滲藿香六曲葛根炭銀花炭茯苓原斛木香川連拌制朴陳皮條芩炭六一散澤瀉炒香穀芽枳殼車前子案居經七月赤痢後重葛根炭陳皮香附炭木香川連拌藿香藝曲原金斛赤白芍淡草縮砂仁白朮土炒制朴大腹焦穀芽荷蒂案痢下赤白腹痛後重身熱脫肛煩渴泛嘔舌乾絳苔起糜點脈弦小痢久脾傷胃陰劫奪治難速效於術土炒茯苓皮焦芍扁豆衣原斛香穀芽水炙竹茹玫瑰花二朵同制炙草炮薑炭陳皮升麻炭石蓮西洋參米炒炒香紅棗吉梅炭吳萸五分拌復方痢次漸減腹痛後重氣陷脫肛舌剝干絳少津脈小弦再以補中益氣之屬白朮土炒赤白芍香附炭砂仁炙柴胡原斛豬茯苓陳皮淡甘草歸身炭石蓮炙升麻藝曲香穀芽案居經六月腹脹且痛便積後重脈弦小滑治以疏和防胎墜藿香藝曲焦芍木香炒銀花原斛香附炭制朴茯苓陳皮砂仁炒條芩枳殼焦荷蒂案大腸積滯未清肝木乘攻木香楂炭半夏條芩炭焦芍青陳皮川連吳萸拌大腹枳殼銀花炭延胡川楝子荷蒂案暑濕熱挾食滯蒸傷腸腑氣血為赤白下痢腹痛後重脈濡弦治以疏和當歸炭桃仁條芩炭赤白芍陳皮原斛藝曲葛根炭延胡銀花炭香穀芽木香川連拌石蓮砂仁荷蒂改方當歸炭條芩炭赤苓赤白芍原斛穀芽藿香葛根炭銀花炭陳皮煨木香川連拌石蓮藝曲荷蒂復方復感食滯赤痢復作腹痛後重脈濡弦恐成腸紅升麻炭赤白芍歸身炭延胡原斛豬茯苓陳皮葛根炭淡甘草香附炭砂仁石蓮樗根白皮紅棗炒香女科腫脹案前方先録二診瀉止惡露亦停脘滿噯酸得食輒脹脈濡弦胃失通降肝失疏泄防延中滿生白朮煨枳實官桂沉香良薑蓽茇雲苓生小朴青陳皮白芍大腹胡蘆巴薑半夏薑竹茹左金丸復方三診投疏運中室腹脹漸消便瀉復作寅卯尤劇脈小弦當培土抑木治法焦芍白朮土炒骨脂山藥原斛穀芽炒黃川貝陳皮扁豆肉果吳萸石蓮茯苓炒香紅棗案濕阻中焦疏運失司腹膨且脹面浮肢腫脈濡小弦苔黃膩腫脹已成調治極難桂枝蜜炙五加豬茯苓澤瀉枳實雞金志曲防己巴戟川牛膝大腹制朴麥芽蒲殼冬瓜皮案咳嗆肢腫身熱氣粗脈濡弦當治脾肺葶藶生草海石桑皮豬茯苓皮防己川貝母杏仁蘇子牛膝冬瓜皮橘紅絡巴戟枇杷葉案居經七月陽明司胎脘痛輒脹脈弦滑肝邪乘擾也治以疏和佐安胎元蘇梗半夏寄生艾葉大腹香附青陳皮川連萸汁炒枳殼條芩川斷茯神蔞仁薑汁竹茹案濕著不化肝脾不運面浮膚腫脈濡弦當治肝脾椒目五加生白朮煨枳實香附大腹茯苓皮防己巴戟生小朴青陳皮砂仁蒲殼香櫞皮案血虛生熱癸停齒衄腹膨且脹肢腫面浮是血熱妄行氣無依附防成腫脹歸尾甲片生白朮茯苓皮川鬱金丹皮大腹桃仁牛膝生小朴青陳皮澤蘭延胡茺蔚子香櫞皮案血不養肝肝橫輒脹腹膨如鼓脈濡數恐成單脹雞金志曲生白朮枳實青陳皮滑石香櫞皮麥芽檳榔生小朴梔皮豬茯苓澤瀉砂殼復方投疏泄肝脾腹脹依然熱熾於裡脈弦小數再治厥陰太陰香附川鬱金柴胡酒炒桃仁牛膝麥芽茺蔚子砂仁炒白芍歸尾甲片雞金志曲香櫞皮女科虛損案木鬱不達肺金失肅肢腫腹脹咳嗆失血脈小弦從經旨金鬱泄之木鬱達之治法川鬱金川貝雞金志曲生白朮枳實竹茹玫瑰花制茯苓皮澤蘭麥芽防己生小朴青陳皮蒲殼茺蔚子案年已二七天癸未至陰虛夜熱汗從盜泄近且白帶時下苔白膩脈細數取效非易慮成童癆銀胡蒿子秦艽菟絲川斛佩蘭紅棗白芍地骨鱉甲茯神苡仁當歸功勞子案營虛生熱風木有餘銀柴蒿子川鬱金鱉甲桑葉川斛茺蔚子白芍歸尾白蒺藜杜仲瓦楞川斷功勞子案木火刑金咳嗆氣促時或痰紅脈小數防成損怯粉沙參白前桑葉知母川貝母炒蘇子旋覆花代赭拌黛蛤散紫菀石膏冰糖煅淡草炒杏仁鼠黏子枇杷葉毛燕二錢五分癸停載余血液枯涸身熱咳嗆脈右小數恐成癆損銀胡蒿子秦艽丹參川斷茯神川鬱金白芍桂枝二分拌地骨鱉甲茯神菟絲桑葉茺蔚子復方寒熱已止月事未通咳嗆有痰脈小數防延入損途粉沙參白前川貝炒杏仁橘絡炒丹參茺蔚子黛蛤散紫菀川楝川鬱金澤蘭茯神枇杷葉案産多傷血煩勞傷氣氣血兩耗營血迭偏心悸眩旋瘕攻腹脹肉瞤驚惕形寒轟熱厥陽時僭四肢麻木舌糙脈細虛帶軟是虛損之末似非草木所能獲效龍骨桑葉白芍桂枝拌八月札丹參茯神柏子仁牡蠣石決瓦楞青陳皮棗仁川斷白蒺藜雞血藤改方龍骨桑葉白芍桂枝拌八月札丹參茯神柏子仁麻仁牡蠣石決瓦楞青陳皮棗仁川斷穭豆衣雞血藤又改方花龍骨桑葉白芍桂枝二分拌柏子仁丹參茯神真滁菊牡蠣石決青黛拌瓦楞青陳皮棗仁川斛雞血藤案胎前咳嗆繼於産後是木火刑金近復脾土受侮腹痛便泄脈細弦恐出蓐勞焦芍扁豆訶子原斛穀芽香附炭砂仁陳皮於術土炒川貝炒黃石蓮茯苓八月札竹茹水炙糯稻根鬚復方咳緩便溏後重腹痛腸鳴舌剝脈細是産後蓐勞調治極難於術土炒焦芍香附炭砂仁扁豆原斛穀芽茯苓陳皮歸身炭牡蠣肉果石蓮炒川貝糯稻根鬚案産後營虛氣無依附腹笥臌膨脹神憊裡熱脈小弦久防延成蓐勞香附四制山梔生白朮炒枳殼當歸桑葉酒炒柴胡撫芎志曲生小朴青陳皮白芍丹皮陳香櫞皮案居經四月身熱形消有時腹痛脈細左右部小數是血虛氣滯難憑孕象銀胡白芍桂枝分半拌四制香附砂仁白朮土炒扁豆衣川鬱金當歸沉香青陳皮瓦楞制朴八月札合歡皮緑萼梅復方血虛肝旺木乘土位營衛迭偏致脘痛便溏跗腫寒熱脈小數調治不易焦芍青陳皮砂仁原斛穀芽茯苓皮扁豆衣白朮土炒香附炭藝曲石蓮大腹八月札緑萼梅合歡皮腹脹且痛便溏後重納減胃鈍裡熱跗腫脈小數當治扶土抑木法土炒於術茯苓連皮陳皮香附炭原斛穀芽採藝曲炮薑炭焦芍扁豆縮砂仁石蓮大腹陳香櫞皮改方土炒白朮枳殼香附炭砂仁原斛桑葉茯苓皮青陳皮大腹扁豆衣焦芍防己穀芽糯稻根鬚四診病由血虛癸停而起繼則肝旺腹脹脹甚則痛克脾為便溏肢腫面㿠帶浮歷經數月病勢有增無減頃又痛甚汗出不已時覺形寒舌變光剝脈來右軟左部小弦而數是為陽虛自汗無疑論治當疏肝之氣以斂陽養胃之陰以健脾希冀汗止納增以圖苟延吉林須五味子牡蠣桑葉扁豆衣八月札糯稻根鬚米炒麥冬茯苓神龍齒石蓮焦白芍玉蝴蝶霍斛穀芽汗出時另以牡蠣粉二兩撲粉改方據述自汗已止余恙均減惟胃脘作脹杳不思納舌仍光剝諒系胃陰被劫委改當從通降陽明著手佐和肝脾再服三劑自有消息吉林須穀芽焦芍桑葉穭豆衣茯神苓陽春砂仁霍石斛白朮土炒陳皮桂枝分半拌香附四制八月札扁豆衣黑石蓮五診前投生脈散合龍牡救逆自汗已止胃納漸增節屆處暑重復汗出不已形神愈見疲憊四肢有時厥冷幸痛勢不舉瀉次漸減厥潮不致舉發頃診脈象左右上部俱見沉細而數舌苔光剝尖刺以將起糜是胃陰日漸敗壞肝家氣火升騰無制太陰輸運無權致一身盡腫據色脈而商治法仍以急則治標斂浮陽以顧胃陰奈脫象已萌難圖萬一牡蠣桑葉吉林須霍斛一錢五分同煎北五味白芍桂枝分半拌茯苓神澤瀉龍齒珍珠母米炒麥冬穭豆衣大腹香穀芽炒紅棗糯稻根鬚案熱灼肺胃失血咳嗆脈右數防延入損途紫石英知母海石白前川貝牛膝粉沙參黛蛤散淡草代赭紫菀橘絡石膏冰糖煅枇杷葉案産後營虛陽不潛藏脈小弦而軟恐成蓐勞當歸根地砂仁末炒西黨參蒸冬朮甘枸杞元丹參桑葉制首烏白芍川芎茯苓神炙草潼白蒺藜煅牡蠣丹皮案平昔勤事內政不但心營肺衛迭交損而肝家氣火升逆莫制夫肝與肺為左右升降之道肝之左升太過肺之右降不及以致木叩金鳴咳嗆痰紅歷有年數近年來失血屢發加以操勞過度心肝之陽偏亢時有心悸少寐自汗盜汗營衛迭偏寒熱往來舌苔剝根膩尖絳脈得左右六部俱見細數症脈合參是氣血兩虛厥陽氣火偏旺當遵經旨金鬱泄之木鬱達之佐寧心神治法而怡養功夫尤當加意藥餌之預蒞商川鬱金川貝桑葉棗仁川連三分拌珍珠母女貞焙丹皮炒丹參川楝子川斛牡蠣茯神八月札旱蓮山梔合歡皮案由瘧致産後復瘧咳嗆面浮氣促脈右滑小數防成蓐勞白芍炙桂枝三分拌川貝粉沙參白前茯苓連皮知母桑葉橘紅炒杏仁黛蛤散紫菀淡草草果竹茹穭豆衣案病傷不復迭感咳嗆脈右數久延防損粉沙參白前川貝炒杏仁旋覆淡草枇杷葉黛蛤散紫菀茯苓橘紅絡代赭扁豆絲瓜絡復方咳嗆漸減裡熱未徹得之病後調養為宜銀胡蒿子秦艽青陳皮知母歸身桑葉白芍地骨川斛淡鱉甲川貝茯神佩蘭案去秋産後裡熱咳嗆迄今形神日漸消瘦脈弦滑恐延成蓐勞銀胡蒿子川斛川貝茯神川鬱金竹茹玫瑰花拌制白芍地骨佩蘭川連拌炒杏仁旱蓮四制香附山梔功勞子女科失血案失血咳嗆已歷三載肺火盛也脈右數以和絡清金法粉沙參白前川貝蘇子旋覆茯苓橘紅絡黛蛤散紫菀炒杏仁淡草代赭竹茹枇杷葉復方肺虛火盛咳嗆身熱曾經失血天癸延期脈右小數切宜怡養元參石膏冰糖煅川貝旋覆代赭拌粉沙參白前絲瓜絡知母淡草炒杏仁橘絡黛蛤散紫菀枇杷葉竹茹案失血咳嗆身熱脘悶脈芤弦當以和絡清金法降香茜根生地旱蓮川貝蘇子藕節川鬱金牛膝茯神丹皮仙鶴草杏仁鼠黏子竹茹案陰虛濕鬱化熱肺金受灼咳嗆失血月事先期腰痠帶下舌黃糙脈右數當以和絡清金兼調八脈桑葉旱蓮粉沙參川貝旋覆淡草茯苓神丹皮仙鶴草白前薇杏仁代赭山梔枇杷葉案咳嗆經久不已肺火自旺痰火尚留身熱痰紅脈右數治以清滲降桑葉知母杏仁蘇子粉沙參白前旋覆花代赭拌石膏冰糖煅生草鬱金鼠黏子黛蛤散紫菀枇杷葉案失血咳嗆形寒發熱脈右滑數是勞損之基調治不易粉沙參白前桑葉茜根川貝知母仙鶴草黛蛤散紫菀丹皮生地炒杏仁茯神白茅根代茶枇杷葉案木火刑金爍絡絡破血溢咳嗆痰紅形寒身熱脈弦滑數舌尖絳苔糙以喻氏西昌法桑葉煅石膏粉沙參白前生地葶藶豬牙皂知母淡草黛蛤散丹皮遠志炒杏仁研枇杷葉絲瓜絡復方投喻氏法咳嗆依然熱熾於裡形瘦氣促脈芤弦而數舌黃中剝似屬勞損之基切宜怡養紫石英海石粉沙參白前牛膝川貝葶藶枇杷葉靈磁石代赭旋覆拌黛蛤散紫菀石膏冰糖煅炒杏仁淡草女科便血熱灼陰絡血從下溢為便血瘀衃肛門痠痛熱熾於裡兼有咳嗆少寐口渴舌尖絳苔糙脈弦而數當和陰絡以清營熱歸身炭銀花炭烏鰂骨血餘炭焙丹皮茯神青陳皮赤白芍炒焦各地榆炭茜根炭槐米炭炒川貝山梔香附炭椿樹根復方便血漸止咳嗆未已脈右數再以清解生地山梔銀花炒槐米川貝茯苓焙丹皮桑葉炒條芩旱蓮杏仁竹茹忍冬藤女科尿血案濕火下趨熱結膀胱氣化窒礙脈濡數治以疏泄厥陰小薊木通桑葉池菊銀花茯苓神黑山梔生地草梢丹皮石決澤瀉青陳皮車前子案經來後期崩漏尿血是奇經衝任少貯脈小弦切宜調養歸身炭生地炭烏鰂骨血餘炭川斷菟絲陳棕炭焦白芍紫丹參茜根炭制香附杜仲茯神蓮房炭復方小溲涓滴兼有尿血脈小弦諒系熱迫膀胱沖海受灼西珀生地木通赤芍茜根炭川斷車前子小薊丹皮草梢澤瀉茯苓神菟絲女科癃閉懷孕四月二便倏閉脈弦數以葵子湯主之冬葵子二錢五分白芍茯苓當歸二錢炙升麻生白朮車前子甘草梢木通滑石瓜蔞大腹嫩條芩淡竹葉女科肝火血液不足肝木偏旺乳旁結核並不紅腫痠疼脈右弦是肝鬱不達氣失疏泄所致生惟怡養功夫尤當加意藥餌之先八月札蒲公英橘葉五片炒丹參四制香附丹皮桑葉玉蝴蝶川鬱金白芍茯神青陳皮山梔白薇朴花女科肝胃氣痛案血不養肝肝旺輒脹脘痛脹及肩背甚則嘔吐脈左弦治以辛酸沉香蓽澄茄蓽茇良薑香附四制薑夏竹茹薑汁炒枳實青陳皮吳萸川連拌白芍桂枝二分同煎菟絲雲苓刺蝟皮案中陽不足肝木犯胃晨起嘔吐得食尤甚甚則脘痛徹背脈左弦右部小滑病在肝胃切宜怡養官桂炙草雲苓丁香旋覆代赭拌戌腹糧二錢薑竹茹白芍薑夏青陳皮山奈吳萸川楝子刺蝟皮案血虛肝旺中氣虛餒瘕攻脘痛腹脹氣滯脈小弦治以辛酸仿仲景法白芍上桂心二分酒製青陳皮瓦楞沉香蓽茇薑夏蓽澄茄雲苓胡蘆巴良薑枳實吳萸香附緑萼梅佛手案寒熱互滯引動肝氣脘痛肢厥鼻衄便結舌糙脈細弦當先