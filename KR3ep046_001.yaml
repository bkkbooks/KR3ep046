白芍靈仙半夏枳殼苡仁茯苓忍冬藤案濕伏三陰痎瘧連枝不分經界身熱神疲脈濡弦法當搜剔絡邪柴胡鱉血炒秦艽半夏橘紅通草赤苓忍冬藤白芍靈仙川貝佩蘭滑石扁斛生熟苡仁寒熱甚重汗出頗爽咳嗆肋痛舌黃糙脈弦數治以和解蒿梗宋半夏杏仁象貝赤苓山梔鮮斛淡芩橘紅絡鬱金蘇子滑石旋覆蘆根絲瓜絡投分利法寒熱依然不達氣滯失調肢痠腹脹脈小弦再以疏泄原斛穀芽枳實青陳皮半夏蔻衣白芍桂枝分半拌苡仁藿梗佩蘭川鬱金樸花滑石佛手案瘧久氣陰延虛濕留太陰肢腫腹膨神疲力懈舌淡絳苔膩脈右濡弦左關兼滑病在肝脾由正虛濕邪留戀所致花甲高年難持重任吉林須白朮土炒茄皮川貝青陳皮志曲枳殼紅棗茯苓皮防己巴戟半夏生小樸雞金澤瀉霍亂案寒邪痧穢格拒中樞吐瀉交作霍亂轉筋肢厥脈伏汗多煩渴亟以仲景法桂枝木瓜紫蘇木香六曲吳萸枳殼白芍蠶砂制樸藿香半夏陳皮竹茹薑汁炒來復丹八分案寒邪痧穢挾食格拒中樞泛嘔腹瀉形寒腹痛舌黃膩脈小弦是屬霍亂亟以疏和紫蘇吳萸姜夏生白芍藿梗赤苓竹茹薑汁炒制樸六曲枳殼新會皮木香蠶砂蔻衣荷葉案寒邪痧穢格拒中樞先瀉後吐形寒身熱舌黃糙脈弦數治以疏和紫蘇六曲藿香半夏黑山梔大豆卷拌吳萸川連拌竹茹薑汁炒制樸陳皮枳殼蒿梗純鉤鉤蠶砂忍冬藤案霍亂轉筋肢厥脈伏防厥脫桂枝木瓜二錢藿香六曲紫蘇牡蠣附子四分煎汁煅姜半夏白芍蠶砂三錢川樸陳皮木香吳萸姜竹茹案寒邪痧穢格拒中樞上吐下瀉脘格腹痛肢厥脈細治以溫運高年局勢未定桂枝木瓜藿梗六曲姜夏木香茯苓白芍蠶砂制樸陳皮吳萸牡蠣製附子四分煎汁煅竹茹薑汁炒來復丹八分入煎案寒邪痧穢格拒中樞致清濁升降不調上吐下瀉四肢厥冷額汗脘悶脈細近伏舌尖絳根苔黃膩局勢非輕有厥脫之險桂枝五分木瓜藿香半夏木香牡蠣附子四分煎汁煅茯苓神白芍蠶砂制樸陳皮澤瀉竹茹薑汁炒來復丹案寒邪痧穢引動暑濕肢麻嘔吐形寒發熱舌白糙脈弦濡數成瘧乃佳白芍桂枝拌炒川連萸汁炒木瓜枳殼藿香白蔻衣通草忍冬藤紫蘇山梔蠶砂姜夏佛手竹茹薑汁炒滑石二診痧穢已止暑濕未消口渴裡熱舌根黃膩脈弦而數再以芳香滲濕藿梗半夏黑山梔苡仁生熟各佩蘭滑石佛手枳殼陳皮純鉤鉤原斛通草澤瀉荷葉赤白茯苓改方去原金斛佩蘭生熟苡仁佛手加煨木香川連拌制小樸煨葛根炒銀花三診痧後復瀉是暑邪下注身熱口渴舌白糙脈弦滑數餘邪未澈尚慮轉瘧原斛藿香銀花山梔蒿梗川連拌通草澤瀉苡仁枳殼連翹心鉤鉤益元散茯神佛手四診痧後暑邪尚盛轉為脾胃濕瘧發必吐瀉交作間日而發已經兩度脈弦滑而數治以疏和水炙柴胡藿香銀花鮮斛茯神半夏葛根炒焦白芍制樸連翹心山梔益元散陳皮竹茹薑汁炒案寒邪痧穢格拒中樞霍亂轉筋肢厥脈伏上吐下瀉舌白糙法以溫運桂枝木瓜紫蘇陳皮半夏木香滑石白芍蠶砂制樸六曲枳殼砂仁竹茹薑汁炒案寒邪痧穢格拒中焦脈濡弦防成急驚紫蘇半夏蠶砂白芍通草赤苓竹茹薑汁炒川連枳殼木瓜藿香益元散山梔車前泄瀉案濕勝濡泄陽明受困炒白朮芸曲藿香陳皮雲苓吳萸赤苓拌炒紅棗制樸扁豆木香半夏枳殼砂仁薑汁竹茹案姚初診體本陰虛木旺脾失健運便溏身熱肝失疏泄腹痛疝氣脈濡弦法當疏運白朮土炒炮薑炭焦白芍扁豆肉果原斛茴香歸尾一錢五分拌茯苓炙草青陳皮芸曲炒澤瀉穀芽紅棗荔枝核案中氣不足溲便為之變便溏溲澀脈濡小弦法當疏滲焦芍於術土炒木香川連拌芸曲通草川萆薢車前子陳皮茯苓砂仁澤瀉滑石生熟苡仁炒紅棗案濕著運滯腹痛便瀉藿梗六曲葛根炒銀花通草澤瀉香穀芽制樸陳皮木香焦白芍滑石砂仁荷蒂案㾦後氣陰俱虛咳嗆便溏藿梗訶子原斛穀芽焦芍杏仁橘紅絡制樸川貝炒黃石蓮茯神桑葉洋參米炒糯稻根鬚案濕熱下注腹痛便瀉藿香芸曲原斛佩蘭炒白朮炒銀花砂仁制樸陳皮苡仁穀芽茯苓皮杭菊車前案寒濕阻中腸胃乃傷腹痛便瀉身熱肢痠脈弦滑法當疏滲紫蘇川連拌六曲藿梗半夏木香穀芽竹茹薑汁炒制樸陳皮枳殼茯苓砂仁澤瀉車前複方濕止而上焦濕熱未清脈弦滑尚須清滲生白朮芸曲原斛苡仁茯苓藿梗扁豆制小樸陳皮牛蒡枳殼半夏穀芽竹茹案體素陰虛里熱氣無依附腹痛氣滯食積便溏脈弦數舌黃膩陰虛而兼陽亢也先治其標香附白朮土炒焦芍原金斛半夏曲銀胡穀芽砂仁扁豆陳皮省頭草雲苓神蒿子澤瀉川楝子案濕困太陰得食便溏香附炭芸曲陳皮焦芍桑葉石決明炮薑炭縮砂仁於術土炒茯苓扁豆池菊陳佩蘭煨肉果炒香紅棗姚複方便溏已止疝氣漸消惟厥陰疏運失司時覺腹脹矢氣脈濡弦再以疏氣滲濕白朮土炒焦芍茯苓原金斛穀芽扁豆藿香制樸陳皮佩蘭益元散澤瀉枳殼紅棗炒香複方前方先錄便瀉已緩胃鈍神疲夜寐欠安腹痛且脹舌糙脈弦小數當治脾胃焦芍於術土炒木香芸曲石蓮原斛紅棗炒香陳皮茯苓砂仁扁豆穀芽半夏竹茹薑汁炒炮薑炭痢案暑濕下迫大腸痢下赤白夜寐欠安飲食式微脈濡弦恐成噤口痢升麻炭赤白芍條芩炭歸身炭藿香芸曲陳皮葛根炭淡甘草銀花炭茯苓神制樸木香川連拌荷蒂複方痢次已減腹痛後重未已脈濡弦腸胃積濕未清治以疏滲原斛穀芽藿香焦芍益元散銀花制樸石蓮芸曲半夏陳皮茯苓神木香川連四分拌荷蒂案暑濕熱挾食滯蒸傷腸腑氣血為赤白下痢楂炭焦六曲葛根條芩炭赤苓枳實貫仲制樸新會皮木香銀花炭藿香滑石荷蒂案咳嗆身熱熱迫便積腹痛後重脈弦滑數局勢非輕訶子葛根芸曲橘紅原斛穀芽益元散川貝炒黃制樸銀花茯苓神石蓮藿香水炙竹茹荷蒂案由瀉變痢痢下赤白是暑濕熱挾食滯蒸傷腸腑氣血所致腹痛後重脘滿輒噯舌黃膩脈濡弦法當疏導腸胃楂炭六曲葛根炭條芩炭藿香枳實貫仲制樸陳皮煨木香銀花炭半夏滑石荷蒂改方投疏理法痢次較減胃鈍謝谷再以疏氣養胃希冀納穀則昌歸身炭條芩炭赤白芍陳皮藿梗川連拌芸曲延胡葛根炭銀花炭制小樸木香原斛穀芽石蓮貫仲複方由赤痢轉為便血陰絡受傷也升麻炭赤白芍槐米炭銀花炭茯苓原斛香穀芽葛根炭淡甘草歸身炭焙丹皮澤瀉石蓮白苧根藝成診下痢傷脾土虛木賊脾失運行之職肝先乏疏泄之權遂致遍體虛浮腹笥䐜脹飲啖入胃脹甚難消矢氣乃舒便通較適形消神憊溲少口乾膀胱氣化失司津液不能敷布苔浮白質光脈右弦左細氣隨血竭脾土敗壞調治法程當養營培氣崇土泄肝佐益腎治水預防水溢高源變生喘厥擬仿景岳一貫煎加減之吉林參白芍土炒於術瓦楞八月札牛膝合歡皮紫丹參川楝茯苓皮大腹玉蝴蝶萼梅滋腎丸改方疊投兩培氣血以崇土御木益腎逐水尚合病機委改當宗原法增刪西黨參茯苓八月札巴戟歸鬚紫丹參綠萼梅土炒於術白芍玉蝴蝶牛膝瓦楞合歡皮滋腎丸案由瘧轉痢是經邪入腑脈小弦再以疏和葛根六曲藿梗炒銀花通草赤苓荷蒂制樸陳皮枳殼條芩炭滑石木香川連三分拌忍冬藤案痢久脾傷及腎關閘大開腎敗胃陰亦敗已見謝谷不納痢次頗多舌苔剝尖絳脈小弦而數治以參苓白朮散吉林須茯苓炒澤瀉升麻炭餘糧石三錢霍斛炒香穀芽土炒於術焦芍陳皮熱水潤赤石脂一錢五分咸半梅二片石膏糯稻根鬚案赤痢已經兩月腹痛後重依然痢次漸減舌絳苔糙脈濡數防成休息痢歸身炭阿膠焦芍土炒於術香附炭石蓮茯苓炮薑炭炙草陳皮地榆炭縮砂仁原斛穀芽樗根白皮案陰虛之體感受暑濕蒸傷腸腑為赤白下痢痢經兩旬腹痛後重胃陰受劫火升鼻衄喉顙起糜裡熱自汗舌絳苔薄脈細而數姑以酸甘化陰仿生脈大意西洋參米炒北五味陳皮熱水潤原斛香穀芽茯苓焙丹皮全麥冬米炒焦白芍於術土炒石蓮炒扁豆澤瀉車前子糯稻根鬚改方加煅牡蠣四錢案休息痢經年是脾虛有濕右臂麻木不仁脈濡弦姑先疏運焦芍炒白朮原斛炒香穀芽山藥木香雞血藤陳皮防風炭石蓮扁豆茯苓砂仁絡石藤疸案濕阻中焦氣機失展茵陳蒿梗生白朮赤苓滑石青陳皮枳殼通草山梔生小樸澤瀉苡仁忍冬藤車前案黃疸脈濡治以疏和鈴茵陳焦梔皮蒿梗苡仁赤白茯苓澤瀉仙人對坐草炙柴胡川柏皮通草佩蘭青陳皮滑石紫背浮萍草案濕阻氣滯脾胃失調鈴茵陳山梔藿梗青陳皮大腹滑石苡仁炙柴胡通草制樸豬茯苓澤瀉忍冬藤車前案濕鬱留而不澈太陰受困純熱無汗脈小弦再以清滲鈴茵陳通草生白朮枳殼川連滑石車前子炙柴胡山梔豬茯苓連皮桑葉黃芩澤瀉紫背浮萍草濕熱案濕阻中焦陽明通降失司脈小弦法以疏和扁斛苡仁生熟各藿香半夏銀胡川貝桑葉佩蘭穀芽枳殼橘紅白芍茯神竹茹玫瑰花制紅棗案風寒外襲濕濁內留銀花大豆卷桑葉杭菊萊菔通草象貝翹心黑山梔紫蘇鉤鉤橘絡滑石蘆根案濕著不化痰氣交阻脈濡弦治以疏滲半夏橘紅絡沉香知母桑葉山梔佩蘭川連拌絲瓜絡枳殼茯苓神白芍川貝天麻鉤鉤竹茹案濕阻氣滯腹痛便赤脈濡弦治以疏滲木通草梢沉香檳榔豬茯苓澤瀉淡竹葉生地滑石烏藥枳實廣木香川連拌砂仁車前子案便血已止陽明余濕未清小溲短赤脈小數再以清滲扁斛佩蘭通草赤苓藿香丹皮鮮荷葉苡仁山梔滑石澤瀉枳殼佛手車前子案濕鬱化熱陽明受困連翹杭菊藿梗佩蘭通草蒿梗山梔鉤鉤苡仁枳殼滑石瓜蔞案濕困太陰肺胃失降原斛佩蘭杏仁炒蘇子通草赤苓苡仁桑葉鬱金橘紅絡六一散車前竹茹案陽明被灼濕熱熏蒸目糊微熱舌糙脈數尚須清滲桑葉石決川斛佩蘭通草碧玉散佛手滁菊鉤鉤苡仁川連丹皮肥知母車前再治太陰伏濕以清膽胃濕熱痰萆薢澤瀉泔浸茅朮橘紅赤苓半夏忍冬藤苡仁山梔川柏皮生樸滑石枳殼竹茹再理陽明以清濕復熱冬瓜子杏仁原斛藿梗橘紅赤苓竹茹薏苡仁象貝佩蘭枳殼半夏滑石荷葉寒邪已化濕熱尚留肺胃冬瓜子杏仁桑葉山梔知母通草蘆根薏苡仁象貝丹皮青蒿元參碧玉散竹茹濕鬱不達法當清滲青蒿通草杭菊大豆卷陳皮苡仁蘆根益元散鉤鉤枳殼黑山梔連翹佩蘭車前濕著不化痰濁上擾舌垢脈小數治先分利三焦藿香佩蘭豆卷半夏蘇子杏仁冬瓜子苡仁枳殼山梔鉤鉤萊菔滑石水炙竹茹案氣虛濕勝健運失職以致消化不良得食易滯脾胃受濕所困神疲力懈自汗盜汗舌黃膩脈濡數治先疏運中樞滲濕滌痰橘紅半夏苡仁生白朮焦梔皮桑葉白芍桂枝二分拌茯苓枳殼佩蘭川連拌生小樸穭豆衣瓜蔞竹茹薑汁炒佛手花案氣虛飲勝濕勝交春內蘊濕毒萌動麻仁蔞仁苡仁牛膝半夏竹瀝制木通赤白茯苓李仁杏仁獨活橘紅生地草梢忍冬藤花車前子
