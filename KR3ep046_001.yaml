body:
  text: 卷上咳嗆案肺移熱於大腸咳嗆便溏身熱渴飲舌糙脈右數帶滑仍以宣豁鮮金斛知母鬱金象貝蘇子葶藶蘆根甜花粉生草杏仁枳殼萊菔茯神絲瓜絡案痰濕內留絡道失宣咳嗆肋痛痰出不爽脈沉弦由氣虛飲勝所致法以通絡導痰旋覆橘絡冬瓜子杏仁蘇子川貝枳殼歸鬚新絳苡仁鬱金半夏雲苓竹茹絲瓜絡案陰虛生熱肺金失肅咳嗆肋痛氣滯輒脹脈小數從金鬱泄之木鬱達之治法川鬱金川貝橘紅絡苡仁桑葉茯苓荷葉川樸花川斛炒蘇子佩蘭山梔澤瀉竹茹玫瑰花制案肺虛火盛咳嗆氣促脅肋引痛胃納式微便結溲澀脈小數法當降肺氣以清痰火紫石英海石粉沙參白前知母淡草枇杷葉茯苓靈磁石代赭旋覆拌黛蛤散紫菀石膏冰糖煅牛膝絲瓜絡案久咳不已肺元自虛陽明生氣因此不振杳不思納舌白膩脈濡小姑先降肺理胃粉沙參白前冬瓜子杏仁知母佩蘭茯苓黛蛤散紫菀苡仁川貝川斛生穀芽竹茹玫瑰花制枇杷葉案痰熱內留肺胃失宣冬瓜子杏仁扁石斛佩蘭蘇子橘紅蘆根苡仁象貝茯苓神山梔萊菔半夏竹茹案痰火留肺肺失清肅旋覆淡草冬瓜子杏仁茯神橘紅絡代赭蘇子苡仁川貝鬱金枇杷葉竹茹案濕熱不澈陽明受灼咳嗆痰少脈濡弦當治少陰陽明桑葉山梔扁斛苡仁半夏青陳皮天麻丹皮旱蓮佩蘭枳殼澤瀉茯苓神竹茹忍冬藤案痰火留肺肺氣膹郁咳嗆氣粗脈沉弦以瀉肺法葶藶淡草蘇子橘紅絡雲苓海石枇杷葉杏仁旋覆代赭拌萊菔黛蛤散川貝牛膝竹茹案痎瘧復感咳嗆身熱脘悶脈右數治先宣上前胡杏仁冬瓜子象貝蘇子鮮斛橘紅絡枯芩鬱金苡仁牛蒡萊菔鉤鉤絲瓜絡蘆根案迭歲咳嗆肺氣膹郁氣滯成疝少腹攻痛脈濡弦以肝肺同治旋覆蘇子冬瓜子苡仁象貝豬茯苓川楝鬱金歸鬚茴香八分拌橘紅絡杏仁澤瀉車前子竹茹案痰濕內留肺胃失宣絡道被蒙脅肋抽痛脈弦小數以通絡導痰法旋覆橘絡杏仁蘇子知母冬瓜子苡仁歸鬚新絳鬱金鼠黏子川貝絲瓜絡竹茹案陰虛濕鬱化熱肺金失肅咳嗆自汗脈右數以千金方冬瓜子苡仁桑葉川石斛知母茯苓橘紅絡廣鬱金杏仁旱蓮穭豆衣川貝地骨竹二青複方久咳不已肺火自旺清肅失司脈右數以西昌法粉參炒杏仁蘇子黛蛤散桑葉知母豬牙皂石膏冰糖煅生甘草葶藶炙紫菀白前川貝枇杷葉案內有鬱火外易招風風活相煽肺胃受灼咳嗆痰多脈右滑數治宜宣豁冬瓜子杏仁知母鬱金蘇子佩蘭忍冬藤花苡仁象貝瓜蔞仁杵原斛橘絡牛蒡竹二青案咳嗆不已肺火自旺脈右數由陰虛生熱所致以瀉白法桑皮地骨銀胡蒿子川貝穭豆苡仁生草知母竹茹功勞子久咳不已肺陰自耗而咳逆身熱盜汗脈右小數當以瀉白法桑皮地骨葶藶蘇子知母鬱金秦艽苡仁淡草杏仁蒿子川貝旋覆鱉甲功勞子複方咳嗆已平嘔逆較減近復感寒著食腹痛便血脈弦小數先治其標後治其本藿香芸曲鬱金訶子銀胡蒿子功勞子制樸橘紅炒杏仁川貝炒黃白芍地骨竹茹案濕困太陰身熱咳嗆脘悶腹脹脈濡數當治肝肺生白朮煨枳實冬瓜子杏仁梔皮鉤鉤葶藶生小樸青陳皮苡仁象貝蟬衣茯苓蘇子竹茹案濕熱內留肺胃失宣咳嗆身熱脈濡弦以千金方冬瓜子杏仁鮮斛牛蒡象貝橘紅絡山梔苡仁鬱金連翹鉤鉤蘇子辰茯神蘆根絲瓜絡案久咳不已肺元自虛痰入絡隧脅肋抽疼脈右數以千金方冬瓜子苡仁芥子萊卜川貝橘紅絡廣鬱金杏仁蘇子旋覆雲苓絲瓜絡竹茹案濕阻氣滯火爍肺金冬瓜子皮苡仁鬱金佩蘭枳殼滑石茯苓連皮竹茹焦山梔皮杏仁原斛知母川貝桑皮地骨車前案衛陽薄弱外感易侵防風生白朮杏仁象貝牛蒡茯苓耆皮冬瓜子鬱金蘇子苡仁蘆根橘紅絡案傷於風者上先受之咳痰薄白形寒裡熱脈右小數當治肺胃冬瓜子杏仁知母蘇子瓜蔞前胡蘆根苡仁鬱金川貝鼠黏子橘紅枯芩竹茹案痰阻絡痹咳嗆右脅肋痛氣逆不能平枕脈滑數苔膩防昏喘旋覆橘紅絡白芥子萊卜杏仁鮮斛蘆根歸鬚川楝子炒蘇子水降香拌桃仁紅藤拌浙貝鬱金知母冬瓜絡案暑風襲肺肺氣膹郁冬瓜子杏仁蘇子牛蒡通草知母蘆根苡仁象貝鬱金橘紅六一散瓜蔞竹茹案咳久肺元自虛痰火膹郁木叩金鳴脈右數左弦以金鬱泄之木鬱達之粉沙參白前川貝橘紅桑葉珍珠母川鬱金黛蛤散紫菀杏仁淡草石膏冰糖煅枇杷葉茯苓案迭感咳嗆熱灼飲泛脈濡弦當治肺胃川鬱金川貝橘紅半夏滑石蘇子薑汁竹茹川樸花杏仁雲苓枳殼海石牛膝絲瓜絡白芥子案傷於風者上先受之咳嗆形寒身熱頭疼荊芥薄荷杏仁丹皮蘇子炒牛蒡蘆根連翹鉤鉤鬱金山梔滑石大豆卷萊菔案傷於風者上先受之前胡杏仁鮮斛牛蒡蘇子象貝蘆根黑山梔大豆卷拌枯芩鬱金連翹鉤鉤萊菔橘紅絡竹茹絲瓜絡複方痰火上留肺氣膹郁冬瓜子杏仁鮮斛牛蒡蘇子萊菔蘆根苡仁鬱金連翹鉤鉤象貝枳殼竹茹蔞仁案久咳肺火自旺肺元自虛粉沙參紫菀桑葉冰糖煅石膏川貝葶藶茯苓黛蛤散白前玄參生甘草杏仁鬱金枇杷葉案肺有鬱火自覺形寒脈右數以西昌法玄參石膏冰糖煅川貝粉參桑葉銀胡葶藶知母淡草炒杏仁山梔丹皮焙白芍茯苓案陰虛生熱肺胃升降失調脈右數治以清泄玄參石膏冰糖煅桑葉山梔女貞龜板茯苓神知母生草丹皮生地旱蓮澤瀉車前子藝成診木火內燔凌心擾肺時或咳逆時或舌疼脈小弦數還須怡養西洋參元參黛蛤散桑葉山梔川連炒杏仁連心麥冬生草白石英丹皮知母竹茹枇杷葉案平木清金降氣化痰紫石英海石川貝蘇子粉沙參仙鶴草旋覆靈磁石代赭杏仁鼠黏黛蛤散枇杷葉淡草牛膝前方先錄自投通絡導痰疏泄厥陰如合符節脈沉濡弦再從原議出入白芥子蘇子川鬱金川楝生梔皮通草扁斛橘紅絡萊菔川樸花茵陳川柏皮滑石車前案暑風外襲引動宿飲咳嗆痰薄形寒身熱脈右數治以宣上荊芥牛蒡豆卷蘇子杏仁象貝雲苓連翹鉤鉤黑山梔萊菔鬱金橘紅蘆根竹茹案氣虛濕勝濕鬱化火火爍肺金咳而嘔逆氣粗肋痛舌膩脈弦而數以千金方冬瓜子杏仁旋覆代赭拌川貝橘紅絡蘇子澤瀉苡仁鬱金淡草半夏茯苓葶藶竹茹絲瓜絡案肺虛火盛咳嗆痰稠時或咯血脈弦帶芤當清肺胃冬瓜子杏仁知母茯神桑葉旱蓮苡仁鬱金川貝蘇子丹皮蔞仁竹茹音嘶案風火上凌金實無聲空沙參元參桑葉知母杏仁炒蘇子蘆根蟬啼殼生草石膏冰糖煅象貝鬱金鼠黏子生地絲瓜絡二診再降肺氣以清痰火冬瓜子杏仁玄參石膏冰糖煅蘇子鼠黏子蘆根苡仁象貝知母生草桑葉鬱金丹皮絲瓜絡案痰火上凌肺氣膹郁音嘶咳逆脈右數發當宣泄空沙參玄參冬瓜子鬱金知母桑葉蘆根灌入麻黃三分兩頭紮緊蟬啼殼生草苡仁杏仁川貝茯苓竹茹案咳嗆不已肺胃失宣粉沙參白前旋覆淡草川貝葶藶橘紅絡黛蛤散紫菀代赭蘇子杏仁竹茹枇杷葉二診肺虛火盛咳嗆音嘶脈右數法當平木清金空沙參白前玄參蟬啼殼川貝蘇子西藏果八分黛蛤散紫菀石膏冰糖煅生甘草炒杏仁茯苓枇杷葉案久咳肺陰延虛音嘶氣粗氣促脈細數切宜怡養北沙參根地秋石一錢同搗川貝母炒杏仁金果欖茯苓京竹衣一片淡天冬淡草蟬啼殼鬱金橘紅絡桑葉枇杷葉案久咳不已肺虛火旺脈右數以西昌法空沙參玄參桑葉知母生地炒蘇子鬱金蟬啼殼生草石膏冰糖煅川貝丹皮鼠黏子竹葉案痰火留肺肺氣膹郁音嘶咳逆脈右數以西昌法空沙參玄參桑葉知母葶藶杏仁鬱金蟬啼殼生草石膏冰糖煅川貝蘇子丹皮蘆根灌入麻黃三分兩頭紮緊枇杷葉複方痰蒙肺竅咳嗆音嘶蜜炙麻黃杏仁冬瓜子苡仁玄參鬱金蘆根石膏冰糖煅生草空沙參蟬啼殼丹皮川貝案痰火留肺肺氣膹郁音嘶咳逆脈右滑數法以開上元參蟬啼殼麻黃蜜炙杏仁生地鬱金蘆根知母生草石膏冰糖煅象貝丹皮蘇子竹葉哮喘痰火內蒙肺氣膹郁哮嗽氣促脈沉小弦法當降肺氣以清痰火葶藶生草桑皮苡仁知母石膏冰糖煅絲瓜絡杏仁蘇子地骨蒿子鬱金萊菔枇杷葉改方北沙參根地川貝母海石煅蛤殼紫菀雲苓神淡天冬龜板炒杏仁牛膝淡甘草白前枇杷葉痰飲案脾肺氣虛痰飲偏勝近復下氣上逆動輒氣促脈沉弦以金匱方蜜炙桂枝雲苓紫石英海石牛膝化橘紅桑葉蒸冬朮淡草靈磁石代赭蛤殼宋半夏牡蠣枇杷葉二診下氣上逆痰飲偏勝自汗盜汗胃鈍納力懈脈沉弦仍宗原議旋覆淡草雲苓川貝牛膝蜜炙桂枝海石代赭橘紅半夏牡蠣小麥蒸冬朮竹茹薑汁炒枇杷葉三診中陽不足濕邪挾飲為患哮嗽氣促脈沉弦以金匱方蜜炙桂枝雲苓連皮橘紅蛤殼旋覆代赭拌牛膝枇杷葉蒸冬朮淡草半夏川貝海石白石英薑汁竹茹案脾肺氣虛痰飲偏勝咳嗆氣粗脈沉弦以金匱方芥子萊菔雲苓海石蛤殼杏仁竹茹薑汁炒蘇子橘紅半夏牛膝川貝旋覆代赭拌枇杷葉二診投金匱方痰飲較平脈沉弦再宗原議增刪藿香陳皮芥子萊菔牛膝川貝旋覆代赭拌枳殼半夏蘇子海石蛤殼杏仁竹茹背擬方風燥上凌陽明通降失司腑陽失曠素勝痰飲乘間升擾擬以清泄陽明通腑滌飲懸擬易謬還希裁酌扁斛佩蘭雲苓海石杏仁麻仁桑葉苡仁橘紅半夏川貝蔞仁枳殼竹茹複方脾肺氣虛痰飲偏勝脈沉弦以金匱方扁斛佩蘭橘紅半夏川貝海石生穀芽苡仁枳殼雲苓桑葉杏仁竹茹白蔻衣三診陽虛飲聚濕留不澈癬疥叢生脈濡弦以補氣逐濕耆皮生白朮橘紅半夏桑葉地膚池菊防風炒枳殼雲苓苡仁天麻原斛佩蘭川連拌竹茹又膏方中氣不足痰飲偏勝動輒氣急以祛痰補氣法黨參三兩橘紅八錢淮藥二兩蛤殼五兩麥冬去心二兩枸杞鹽水炒二兩白芍一兩半蒸冬朮一兩半半夏一兩半牛膝三兩川貝研末一兩紫石英四兩紅棗三十枚池菊一兩半茯苓三兩熟地沉香末炒二兩煅牡蠣四兩玉竹二兩香附二兩制首烏三兩竹茹薑汁炒一兩半炙草五兩炙西耆二兩海石四兩桑葉二兩砂仁入煎四錢歸身一兩半留出川貝粉加陳阿膠二兩鹿角膠冰糖八兩收膏案中陽不足飲痰瘀聚咳嗆氣促動則眩旋睡中驚惕舌黃膩脈沉弦以金匱方蜜炙桂枝雲苓神半夏川貝母二錢海石桑葉旋覆代赭拌蒸冬朮廣橘紅天麻珍珠母八錢牛膝滁菊淡草竹茹背擬方眩旋生於風飲痰聚於脾肺咳痰不爽痰飲為患也小溲頻行氣化不調也委改當從此著想桑葉半夏川杏仁蜜炙桂枝雲苓海石蛤殼天麻川貝旋覆花蒸冬朮芥子牛膝橘紅枇杷葉案中陽不足濕痰內凝炙橘紅茯苓竹瀝製半夏淡草枳殼川鬱金白芍杏仁蔞仁香附竹茹薑汁炒案痰濕阻於膽胃以溫膽湯竹瀝製半夏枳殼杭菊豆卷苡仁通草橘紅茯神鉤鉤佛手山梔佩蘭滑石車前案外感風寒引動宿飲哮嗽氣促身熱口渴舌白膩脈沉弦小滑法當降氣滌痰須防喘汗旋覆淡草蘇子雲苓杏仁海石鮮金斛代赭白芥子萊菔半夏鬱金牛膝橘紅絡蘆根案顧嗜酒傷陽陽虛飲聚咳嗆痰稠神疲納懈脈濡弦以桑麻溫膽桑葉橘紅雲苓蔻衣川貝母川鬱金原斛滑石天麻半夏枳殼苡仁炒杏仁佩蘭竹茹薑汁炒顧複方中陽不足痰飲內凝投溫膽湯眩旋稍減脈沉弦曾經失血防厥冒桑葉山梔天麻橘紅川貝佩蘭白蔻衣丹皮旱蓮半夏枳殼鬱金雲苓水炙竹茹玫瑰花制案濕火下趨致成肛瘍痰飲內凝咳嗆氣促橘紅雲苓海石蛤殼枳實丹皮旋覆代赭拌半夏川貝牛膝白芥蔞仁麻仁香附風溫附濕溫暑溫秋溫冬溫案風溫外襲肺胃先受咳嗆痰音顴紅目赤頭疼氣粗脈弦數防發風痧以辛散法荊芥豆卷銀