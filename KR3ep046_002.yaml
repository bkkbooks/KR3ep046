body:
  text: 卷中虛損案年近花甲中陽衰餒肝木乘間橫克脾胃因斯受困脾受之則輸運失職胃受之則通降無權素勝痰飲易聚難化嘔惡噯滿類似呃逆營衛不和寒熱往來杳不思納夜寐欠安按脈沉弦小軟舌絳苔剝證脈合參病在脾胃後天生生之氣日漸摧殘論治當以補土生金佐以通降陽明希冀得谷則昌附方蒞裁旋覆淡草橘紅霍斛茯苓神銀胡秫米代赭半夏竹茹穀芽制冬朮白芍佩蘭柿蒂二診投補土生金佐以通降陽明與病機若合符節據述嘔惡漸平寒熱漸退飲啖式微寤寐稍安此皆轉危為安之兆惟高年中虛痰飲氾濫陽明容納無權賁門窄小吞嚥時或作梗頃診脈象沉弦重按稍振舌絳苔糜種種見證不外乎脾胃兩經脾宜升則健胃宜降則和脾胃升降調和氣機自然活動治法當從此著想無使胃敗脾傷如無他變錄方仍請高明主政霍斛茯苓橘紅半夏旋覆代赭拌香穀芽竹茹玫瑰花制蒸冬朮淡草白芍扁豆佩蘭八月札紅棗柿蒂三診腎為先天脾為後天脾胃少元陽之助脾不能為胃行其津液水穀精微徒釀痰濁以致濁飲上泛嘔逆頻仍營衛不和寒熱往來舌絳苔糜脈沉弦較前略振治法仍以脾胃兩顧扶過春分自有消息人參白芍霍斛半夏佩蘭八月札竹茹玫瑰花制制首烏茯神橘紅甘草生穀芽玉蝴蝶柿蒂案血後陰傷木旺金被火刑脈虛弦已經延入損途粉參黛蛤散桑葉川貝蘇子炙橘紅藕節白前白石英秋石二錢五分炒杏仁桃仁淡草枇杷葉案脾陽虛弱將入損途生白朮淮藥肉果石蓮茯苓志曲罌粟殼益智仁扁豆訶子穀芽炒澤瀉炒香紅棗車前子案疰夏消渴腹痛便泄暑熱傷陰脾虛夾滯炒青蒿楂炭制樸胡連檳榔紅棗益元散扁豆麥芽白芍百部榧子肉案陰虛生熱水不涵木細地蛤粉炒知母西洋參麥冬丹皮桑葉茯苓神龜板川柏制首烏生草山梔川斛炒白芍案濕蒸熱鬱肺金受灼絡道被蒙咳嗆肋痛脈右數久咳陰虛延成損怯旋覆橘絡冬瓜子杏仁知母粉沙參枇杷葉歸鬚新絳苡仁鬱金川貝黛蛤散絲瓜絡案煩勞傷陽氣虛濕勝初起兩腿發痠是屬濕熱下注迄今兩月有餘氣陰延虛種種見證不外肝腎兩虛君相不寧治法以育陰潛陽兩調肝腎細地知母花龍骨川貝秫米桑葉仙夏紅棗龜板川柏牡蠣白芍茯神原麥冬澤瀉另用參鬚代茶案降肺氣以清肺火滋腎水以涵肝木仿子母同調治下藥淨素桑葉知母根地川貝茯苓丹皮粉沙參石膏冰糖煅生草天冬杏仁澤瀉竹茹枇杷葉案水不制火消渴大症珠兒參首烏細地知母丹皮川連半夏紅棗青梅肉麥冬龜板川柏白芍淡草雲苓案病後復感津液受劫時交濕令濕鬱化熱神疲納懈舌中剝脈小弦當治陽明西洋參白芍知母半夏竹瀝制丹皮茯苓神桑葉制首烏原斛川貝滁菊佩蘭生穀芽石決秫米二診病傷不復復勞復感發熱形寒脘悶泛嘔脈弦數先治其標後顧生本蒿梗山梔大豆卷拌半夏原斛通草枳殼紫蘇川連拌淡芩鉤鉤陳皮茯神滑石瓜蔞竹茹薑汁炒三診感邪已化裡熱未澈胃氣似有來復夜寐稍安舌仍中剝脈濡而弦再以通降陽明原斛佩蘭枳殼杏仁丹皮茯神冬瓜子苡仁藿香橘紅鬱金山梔瓜蔞生穀芽竹茹病傷不復已經數月內風暗動夾感風邪頸項強痛肢厥類痙自汗滂沱脈左弦大是積虛成損厥變堪虞牡蠣石決廣鬱金遠志甘草水炙生地蠍尾煅石膏龍齒桑葉石菖蒲茯神辰拌池菊鉤鉤竹葉阿膠蛤粉炒成珠改方桑葉山梔橘紅杏仁原斛冬瓜子蔞仁丹皮茯神半夏鬱金佩蘭薏苡仁麻仁竹茹四診餘熱漸清胃氣漸復惟神疲力懈便難腰痠脈小弦由病後氣陰未復所致尚須清滲知母杏仁原斛冬瓜子桑葉珍珠母蔞仁川貝苡仁佩蘭茯苓神丹皮生穀芽竹茹案病後元氣未復裡熱未澈交陰微寒脈小弦首先清養徐圖恢復西洋參桑葉銀胡蒿子仙夏茯神川斛制首烏細地白芍地骨秫米龜板紅棗案陰虛火旺肺胃受灼桑葉山梔根地知母苡仁茯苓川貝丹皮川斛龜板川柏佩蘭橘紅紅棗水炙竹茹複方肺胃痰熱殊甚大腸濕火留連脈右小滑而數是屬陰虛火旺以滋清互施根地砂仁制知母川貝二錢冬瓜子茯苓神澤瀉川斛龜板川柏杏仁苡仁炙橘紅丹皮佩蘭紅棗案失血咳嗆肺元自虛肺火偏旺喉疼氣粗舌絳脈芤弦勞損之基切宜怡養元參蟬啼花金果蘭川貝茯苓原麥冬粉沙參知母冰糖煅石膏黛蛤散杏仁淡草細生地西藏果八分枇杷葉案脾肺氣虛飲痰內凝曾經失血近復面浮腹膨脈弦滑數舌絳防延入損途葶藶淡草生地牛膝生白朮椒目五茄杏仁茯神丹皮枳實豬茯苓連皮防己旋覆代赭拌蒲殼複方咳緩喘平腹膨漸消脈弦小數仍宗原議增刪白朮陳皮冬瓜皮川貝防己葶藶桑葉枳殼大腹茯苓皮杏仁苡仁蘇子竹茹案陰虛痞聚屏傷陽絡咯血盈盆便溏身熱癆損之基白朮土炒陳皮原斛茯苓桑葉仙鶴草香穀芽枳殼焦芍佩蘭扁豆旱蓮焙丹皮碧玉散鼻衄陽明胃火有餘上干清道而為鼻衄脈弦數當清營熱生地山梔旱蓮知母懷牛膝通草丹皮茜根茯神桃仁碧玉散桑葉竹葉失血案震傷陽絡血隨氣載紫降香茜根生地旱蓮川貝炒蘇子枇杷葉懷牛膝桑葉丹皮仙鶴草杏仁鼠黏子藕節案濕鬱化火蒸爍肺金咳嗆痰紅身熱盜汗脈弦數姑先清燥救肺法桑葉杏仁蘇子知母生地茜根枇杷葉石膏冰糖煅生草牛蒡蔞仁丹皮仙鶴草絲瓜絡案咳嗆失血木火刑金爍絡使然脈右數法當平木清金粉沙參白前川貝淡甘草旱蓮茯苓神枇杷葉黛蛤散紫菀杏仁八月札仙鶴草鬱金竹茹複方投平木清金法氣促較平咳嗆依然脈右數再以清降經霜桑葉淡甘草粉沙參白前川貝茯苓神澤瀉冬蟲夏草仙鶴草黛蛤散紫菀炒杏仁枇杷葉竹茹案失血咳嗆身熱氣粗脈右數法當和絡清金降香三七生地山梔桑葉旱蓮藕節牛膝茜根丹皮茯神川鬱金仙鶴草竹茹絲瓜絡案木火刑金爍絡絡破血溢咳嗆痰紅脈小數法當平木清金兼調氣火桑葉杏仁旱蓮生地丹皮枳殼川貝藕節石膏冰糖煅生草仙鶴草山梔茯神澤瀉茜根竹茹二診熱灼陽絡血從上溢咳嗆痰紅脈芤弦以和絡清金法生地山梔桑葉仙鶴草川貝炒蘇子藕節丹皮茜根茯神旱蓮杏仁鼠黏子茅根三診再和陽絡以清痰火生地山梔桑葉仙鶴草杏仁炒蘇子藕節丹皮茜根茯神旱蓮鬱金鼠黏子橘紅枇杷葉案久熱傷絡絡破血溢咳嗆氣促脈芤弦法當和絡清金降香紫石英生地茜根仙鶴草海石桑葉橘紅絡牛膝靈磁石丹皮茯神旱蓮代赭藕節案咳逆傷絡血從上溢咳痰腥臭脈弦小數恐成肺痿粉沙參粉草川貝紫菀蘇子鼠黏子枇杷葉粉丹皮蛤粉杏仁白前茯神青金散姜竹茹案熱灼陽絡肺胃先受困生地山梔桑葉知母通草蔞仁川貝丹皮茜根茯神旱蓮碧玉散澤瀉杏仁茅根複方桑葉山梔玄參石膏冰糖煅杏仁茯神丹皮旱蓮知母生草鬱金竹茹枇杷葉案久咳傷絡絡破血溢血隨氣載咯血盈盞身熱氣粗脈芤弦勞損之基紫降香三七生地桑葉茯神海石紫石英懷牛膝茜根丹皮仙鶴草川貝代赭靈磁石藕節二診失血咳嗆肺胃火熾脈芤弦以喻氏法桑葉粉沙參旱蓮茯神白前雲苓黛蛤散石膏冰糖煅淡甘草仙鶴草丹皮紫菀藕節枇杷葉案木火刑金失血咳嗆脈右數以平木清金法粉沙參白前旱蓮淡草石膏冰糖煅知母豬牙皂黛蛤散紫菀仙鶴草蘇子鼠黏子橘絡枇杷葉案木火刑金失血咳嗆脈芤弦以平木清金法粉沙參白前川貝蘇子仙鶴草淡草連子絲瓜絡黛蛤散紫菀杏仁鼠黏子旱蓮旋覆代赭拌枇杷葉去毛案血隨氣載咯血盈盞脈芤弦切宜怡養紫石英海石桑葉橘紅絡丹皮牛膝藕節靈磁石代赭生地仙鶴草茜根雲苓荷葉枇杷葉案熱灼陽絡血從上溢降香茜根丹皮紫石英仙鶴草知母旋覆代赭石拌牛膝生地山梔靈磁石旱蓮川貝海石桑葉案木火刑金失血咳嗆脈左弦以平木清金法粉沙參白前桑葉仙鶴草川貝海石丹皮黛蛤散紫菀旱蓮淡甘草杏仁牛膝川斛枇杷葉案木火刑金氣促咳血粉參白前川貝蘇子紫石英旋覆洋青鉛蛤粉紫菀杏仁淡草懷牛膝代赭枇杷葉案木火刑金失血咳嗆粉沙參白前川貝蘇子桑葉旱蓮藕節黛蛤散紫菀杏仁鼠黏子丹皮仙鶴草枇杷葉案血後餘熱未清肺金失肅咳嗆痰少身熱便難舌糙脈芤弦再以清泄川斛桑葉旱蓮苡仁知母佩蘭川貝丹皮仙鶴草杏仁山梔藕節冬瓜子案陰虛肺熱肅降失司脈細數治以清泄桑葉山梔仙鶴草淡草川斛知母丹皮杭菊旱蓮桃仁苡仁佩蘭藕節案咳嗆痰紅是木火刑金脈滑數法當和絡清金桑葉山梔冬瓜子杏仁石膏冰糖煅生草鮮藕節丹皮茜根苡仁象貝鼠黏子蘇子絲瓜絡連子案熱傷陽絡血從上溢脈芤弦當清陽明以和陽絡桑葉旱蓮生地山梔通草川斛知母茯神仙鶴草丹皮茜根滑石佩蘭藕節案勞倦陽弛絡傷血溢咯血盈盆盈盞胃絡抽疼氣逆脘悶裡熱脈左芤弦當和陽絡以清營熱惟怡養功夫尤當加意於藥餌之預犀角二分磨研沖丹皮二錢降香旱蓮茜根茯神川鬱金生地一兩牛膝三七仙鶴草桃仁藕節白茅根複方咯血初止陽絡未和咳痰薄白脈沉芤弦再以清營和絡生地山梔牛膝蘇子旱蓮川鬱金桑葉川連丹皮茜根桃仁鼠黏仙鶴草川貝母茯神案濕鬱化火熏灼胃絡絡破則血從上溢喉癬則吞嚥作梗脈濡弦舌黃膩由陰分不足所致調養為上元參空沙參炒杏仁生地淡草仙鶴草茯苓川貝蟬啼殼黛蛤散丹皮通草金果蘭八分海石枇杷葉案失血咳嗆肺胃火熾出痰薄白脈右濡數是熱灼陽絡所致切宜怡養粉沙參白前桑葉早蓮川貝蘇子石膏冰糖煅黛蛤散紫菀茯神仙鶴草淡草鼠黏子丹皮枇杷葉複方血止咳緩熱熾於裡出痰仍薄脈弦數仍治肺胃桑葉旱蓮知母丹皮炙橘紅生地藕節茯神仙鶴草川貝川斛冰糖煅石膏淡草竹茹案久咳不已肺元自虛木火閃爍咳嗆失血脈弦以平木清金粉沙參白前桑葉淡草川貝茯苓海石黛蛤散紫菀仙鶴草橘紅杏仁丹皮牛膝枇杷葉複方血止咳嗆未已脈小弦再以肝肺同治經霜桑葉淡草北沙參橘紅絡海石紫菀茯苓冬蟲夏草仙鶴草麥冬黛蛤散牛膝白前枇杷葉案濕熱傷絡絡血上溢咳血屢發脈芤弦勞損之基紫石英海石生地旱蓮橘絡黛蛤散茜根靈磁石代赭丹皮仙鶴草牛膝抱茯神藕節案陽絡受傷血從上溢咯血脘悶微覺咳逆舌尖絳苔膩脈弦芤而數以和絡清金法降香三七生地山梔川連淡草桑葉牛膝茜根丹皮茯神旱蓮仙鶴草藕節複方咯血未止木火偏旺氣衝咳逆火升頭眩嘈雜心悸脈仍芤弦帶數再以和絡清金佐平木火生地山梔紫石英牛膝桑葉淡草茯神藕節丹皮茜根參三七石決青黛拌仙鶴草川連旋覆代赭拌三診咯血已止陽絡未和虛里穴呼吸抽疼是血去氣無依附所致脈右小數法以和絡調氣佐平木火旋覆橘絡生地山梔知母仙鶴草絲瓜絡歸鬚新絳丹皮茯苓川貝旱蓮路路通茜根案頓嗆不已挾感屢發咳甚則痰中帶紅脈右數體素陰虛內熱由熱留痰戀所致以喻氏西昌法粉沙參白前石膏冰糖煅知母炒杏仁丹皮枇杷葉黛蛤散桑葉淡草川貝葶藶茯苓絲瓜絡旋覆代赭拌案肺胃火熾陽明受灼失血咳嗆脈芤弦以和絡清金法桑葉杏仁生地山梔蘇子仙鶴草知母石膏冰糖煅生草丹皮茜根鼠黏子旱蓮瓜蔞藕節案久咳不已陽絡震傷失血氣促脈芤弦切宜怡養紫石英海石桑葉仙鶴草川貝旋覆橘紅絡靈磁石代赭旱蓮淡甘草雲苓牛膝枇杷葉案痰火爍絡咳嗆失血脈小弦以和絡清金法桑葉杏仁知母蘇子仙鶴草茜根藕節石膏冰糖煅生草川貝